<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000033" />
      <stop offset="100%" stop-color="#0000FF" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#grid)" />
  
  <!-- Geometric Shapes -->
  <rect x="100" y="50" width="200" height="200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" transform="rotate(15 200 150)" />
  <rect x="850" y="-50" width="300" height="300" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4" transform="rotate(-10 1000 100)" />
  <circle cx="1000" cy="300" r="150" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4" />
  
  <path d="M 0 350 L 1200 250 L 1200 400 L 0 400 Z" fill="rgba(0,0,0,0.2)" />
  <path d="M 0 380 L 1200 320 L 1200 400 L 0 400 Z" fill="rgba(0,0,0,0.3)" />

  <!-- Text -->
  <text x="600" y="220" font-family="'Inter', 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">OPAQUE</text>
  <text x="600" y="270" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="24" font-weight="400" fill="#8888FF" text-anchor="middle" letter-spacing="4">PROOF OF ALPHA PROTOCOL</text>
  
  <!-- Decorative Elements -->
  <circle cx="600" cy="120" r="6" fill="#00FFCC" />
  <line x1="600" y1="126" x2="600" y2="140" stroke="#00FFCC" stroke-width="2" />
</svg>
